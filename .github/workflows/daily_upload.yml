name: Daily Data Regeneration - Supabase

on:
  schedule:
    # Corre todos los días a las 05:30 UTC (aprox 00:30 AM COT / 02:30 AM CLT)
    - cron: '30 5 * * *'
  workflow_dispatch: # Permite ejecución manual

env:
  PYTHON_VERSION: '3.12'

jobs:
  regenerate-data:
    name: Regenerate and upload data to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
        timeout-minutes: 10

      - name: Run complete data regeneration
        id: regenerate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🚀 Iniciando regeneración de datos..."
          python supabase/regenerate_complete_data.py 2>&1 | tee regeneration.log

          # Verificar exit code
          if [ $? -eq 0 ]; then
            echo "✅ Regeneración completada exitosamente"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Regeneración falló"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        timeout-minutes: 20

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: regeneration-logs
          path: regeneration.log
          retention-days: 7

      - name: Notify on success
        if: steps.regenerate.outputs.status == 'success'
        run: |
          echo "📊 Data regeneration successful"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ ALERTA: Data regeneration failed"
          echo "Por favor revisar los logs en el GitHub Actions"
        shell: bash
